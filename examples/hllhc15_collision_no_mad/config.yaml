
# Optics file
optics_file: ./opt_round_150_1500_thin.madx

# Beam parameters
beam_config:
  b1:
    beam_energy_tot: 7000           # [GeV]
  b2:
    beam_energy_tot: 7000           # [GeV]

new_knobs:

  on_alice: on_alice_normalized * 7000e9 / energy0_b1
  on_lhcb: on_lhcb_normalized * 7000e9 / energy0_b1

  # Octupole knobs
  kof.b1: kmax_mo / imax_mo * i_oct_b1 / brho0_b1
  kof.b2: kmax_mo / imax_mo * i_oct_b2 / brho0_b2
  kod.b1: kmax_mo / imax_mo * i_oct_b1 / brho0_b1
  kod.b2: kmax_mo / imax_mo * i_oct_b2 / brho0_b2

  kof.a12b1: kof.b1
  kof.a23b1: kof.b1
  kof.a34b1: kof.b1
  kof.a45b1: kof.b1
  kof.a56b1: kof.b1
  kof.a67b1: kof.b1
  kof.a78b1: kof.b1
  kof.a81b1: kof.b1

  kof.a12b2: kof.b2
  kof.a23b2: kof.b2
  kof.a34b2: kof.b2
  kof.a45b2: kof.b2
  kof.a56b2: kof.b2
  kof.a67b2: kof.b2
  kof.a78b2: kof.b2
  kof.a81b2: kof.b2

  kod.a12b1: kod.b1
  kod.a23b1: kod.b1
  kod.a34b1: kod.b1
  kod.a45b1: kod.b1
  kod.a56b1: kod.b1
  kod.a67b1: kod.b1
  kod.a78b1: kod.b1
  kod.a81b1: kod.b1

  kod.a12b2: kod.b2
  kod.a23b2: kod.b2
  kod.a34b2: kod.b2
  kod.a45b2: kod.b2
  kod.a56b2: kod.b2
  kod.a67b2: kod.b2
  kod.a78b2: kod.b2
  kod.a81b2: kod.b2

config_knobs_and_tuning:

    knob_settings:

      # Orbit knobs
      on_x1: 250            # [urad]
      on_sep1: 0            # [mm]
      on_x2: -170           # [urad]
      on_sep2: 0.138        # [mm]
      on_x5: 250            # [urad]
      on_sep5: 0            # [mm]
      on_x8: -250           # [urad]
      on_sep8: -0.043       # [mm]
      on_a1: 0              # [urad]
      on_o1: 0              # [mm]
      on_a2: 0              # [urad]
      on_o2: 0              # [mm]
      on_a5: 0              # [urad]
      on_o5: 0              # [mm]
      on_a8: 0              # [urad]
      on_o8: 0              # [mm]
      on_disp: 1            # Value to choose could be optics-dependent

      # Crab cavities
      on_crab1: -190        # [urad]
      on_crab5: -190        # [urad]

      # Magnets of the experiments
      on_alice_normalized: 1
      on_lhcb_normalized: 1
      on_sol_atlas: 0
      on_sol_cms: 0
      on_sol_alice: 0

      # RF voltage and phases
      vrf400:       16.0            # [MV]
      lagrf400.b1:   0.5            # [rad]
      lagrf400.b2:   0.             # [rad]

      # Octupoles
      i_oct_b1:     -235            # [A]
      i_oct_b2:     -235            # [A]

    closed_orbit_correction:
      b1: corr_co_b1.json
      b2: corr_co_b2.json

    # Tunes and chromaticities
    qx:
      b1: 62.31
      b2: 62.31
    qy:
      b1: 60.32
      b2: 60.32
    dqx:
      b1: 5
      2: 5
    dqy:
      b1: 6
      b2: 6

    knob_names:
      b1:
        q_knob_1: kqtf.b1
        q_knob_2: kqtd.b1
        dq_knob_1: ksf.b1
        dq_knob_2: ksd.b1
        c_minus_knob_1: c_minus_re_b1
        c_minus_knob_2: c_minus_im_b1
      b2:
        q_knob_1: kqtf.b2
        q_knob_2: kqtd.b2
        dq_knob_1: ksf.b2
        dq_knob_2: ksd.b2
        c_minus_knob_1: c_minus_re_b2
        c_minus_knob_2: c_minus_im_b2

config_beambeam:
    bunch_spacing_buckets: 10
    num_slices_head_on: 11
    num_long_range_encounters_per_side:
      ip1: 25
      ip2: 20
      ip5: 25
      ip8: 20
    sigma_z: 0.076
    num_particles_per_bunch: 2.2e11
    nemitt_x: 2.5e-6
    nemitt_y: 2.5e-6

config_lumi_leveling:
    ip2:
      separation_in_sigmas: 5
      plane: 'x'
      impose_separation_orthogonal_to_crossing: false
      knobs:
        - on_sep2
      bump_range:
        b1:
          - e.ds.l2.b1
          - s.ds.r2.b1
        b2:
          - s.ds.r2.b2
          - e.ds.l2.b2
      preserve_angles_at_ip: true
      preserve_bump_closure: true
      corrector_knob_names:
       # to preserve angles at ip
       - corr_co_acbyvs4.l2b1
       - corr_co_acbyhs4.l2b1
       - corr_co_acbyvs4.r2b2
       - corr_co_acbyhs4.r2b2
       # to close the bumps
       - corr_co_acbyvs4.l2b2
       - corr_co_acbyhs4.l2b2
       - corr_co_acbyvs4.r2b1
       - corr_co_acbyhs4.r2b1
       - corr_co_acbyhs5.l2b2
       - corr_co_acbyvs5.l2b2
       - corr_co_acbchs5.r2b1
       - corr_co_acbcvs5.r2b1

    ip8:
      luminosity: 2.0e+33
      num_colliding_bunches: 2572
      impose_separation_orthogonal_to_crossing: false
      knobs:
        - on_sep8
      bump_range:
        lhcb1:
          - e.ds.l8.b1
          - s.ds.r8.b1
        lhcb2:
          - s.ds.r8.b2
          - e.ds.l8.b2
      preserve_angles_at_ip: true
      preserve_bump_closure: true
      corrector_knob_names:
       # to preserve angles at ip
       - corr_co_acbyvs4.l8b1
       - corr_co_acbyhs4.l8b1
       - corr_co_acbyvs4.r8b2
       - corr_co_acbyhs4.r8b2
       # to close the bumps
       - corr_co_acbyvs4.l8b2
       - corr_co_acbyhs4.l8b2
       - corr_co_acbyvs4.r8b1
       - corr_co_acbyhs4.r8b1
       - corr_co_acbcvs5.l8b2
       - corr_co_acbchs5.l8b2
       - corr_co_acbyvs5.r8b1
       - corr_co_acbyhs5.r8b1
